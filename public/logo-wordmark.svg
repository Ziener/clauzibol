<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="wmGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="wmLockBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A849"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond: diep marineblauw, zoals de site -->
  <rect width="1200" height="320" fill="#0a0e27"/>

  <!-- Logo: hangslot met kruis, scale 2.0 → 240x240 -->
  <g transform="translate(180 40) scale(2.0)">
    <path d="M34 56 V42 a26 26 0 0 1 52 0 V56"
          stroke="url(#wmGold)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <rect x="24" y="56" width="72" height="64" rx="6" fill="url(#wmLockBody)"/>
    <rect x="56" y="70" width="8" height="40" fill="#0a0e27"/>
    <rect x="46" y="82" width="28" height="8" fill="#0a0e27"/>
  </g>

  <!-- Woordmerk "Clauzibol" -->
  <text x="460" y="180"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="96" font-weight="500"
        fill="#f5f1e8">Clauzibol</text>

  <!-- Subtiele gouden lijn -->
  <line x1="460" y1="200" x2="600" y2="200" stroke="url(#wmGold)" stroke-width="1" opacity="0.5"/>

  <!-- Ondertitel "VERZEGELDE PROFETIE" -->
  <text x="460" y="232"
        font-family="Inter, Arial, sans-serif"
        font-size="22" letter-spacing="8"
        fill="url(#wmGold)">VERZEGELDE PROFETIE</text>
</svg>
