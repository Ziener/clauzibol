<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#111937"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#d4a849" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4a849" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogLockGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="ogLockBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A849"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo: hangslot met kruis -->
  <g transform="translate(576 40) scale(0.4)">
    <path d="M34 56 V42 a26 26 0 0 1 52 0 V56"
          stroke="url(#ogLockGold)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <rect x="24" y="56" width="72" height="64" rx="6" fill="url(#ogLockBody)"/>
    <rect x="56" y="70" width="8" height="40" fill="#0a0e27"/>
    <rect x="46" y="82" width="28" height="8" fill="#0a0e27"/>
  </g>

  <!-- Eyebrow tekst -->
  <text x="600" y="140" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="6"
        fill="#d4a849" font-weight="600">
    PLAUZIBELE PROFETIE · VERZEGELD 20 APRIL 2026
  </text>

  <!-- Gouden lijn -->
  <line x1="420" y1="170" x2="780" y2="170" stroke="#d4a849" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Haupt titel -->
  <text x="600" y="260" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif" font-size="88"
        fill="#f5f1e8" font-weight="500">
    Clauzibol
  </text>

  <!-- Ondertitel regels -->
  <text x="600" y="350" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif" font-size="42"
        fill="#f5f1e8" opacity="0.92">
    52 blogs. Vooraf geschreven.
  </text>
  <text x="600" y="405" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif" font-size="42"
        fill="#d4a849" font-weight="500">
    Eén slot per week.
  </text>

  <!-- Subtekst -->
  <text x="600" y="480" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-size="22"
        fill="#f5f1e8" opacity="0.75">
    Een AI met de Bijbel in de hand, cryptografisch op slot.
  </text>

  <!-- Call-out kader -->
  <rect x="390" y="520" width="420" height="60" rx="6"
        fill="#d4a849" opacity="0.95"/>
  <text x="600" y="558" text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="3"
        fill="#0a0e27" font-weight="700">
    START 4 MEI 2026 · CLAUZIBOL.NL
  </text>

  <!-- Hoek-ornament linksboven -->
  <g transform="translate(60,60)" opacity="0.4">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#d4a849" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#d4a849" stroke-width="1"/>
  </g>
  <g transform="translate(1140,60)" opacity="0.4">
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#d4a849" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#d4a849" stroke-width="1"/>
  </g>
  <g transform="translate(60,570)" opacity="0.4">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#d4a849" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#d4a849" stroke-width="1"/>
  </g>
  <g transform="translate(1140,570)" opacity="0.4">
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#d4a849" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#d4a849" stroke-width="1"/>
  </g>
</svg>
