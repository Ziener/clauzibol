<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="igBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#111937"/>
    </linearGradient>
    <linearGradient id="igGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="igLockBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A849"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond -->
  <rect width="1080" height="1080" fill="url(#igBg)"/>

  <!-- Subtiele sterrenhemel -->
  <g fill="#f5f1e8" opacity="0.5">
    <circle cx="80" cy="150" r="1.2"/>
    <circle cx="180" cy="90" r="0.8"/>
    <circle cx="260" cy="220" r="1"/>
    <circle cx="340" cy="130" r="0.7"/>
    <circle cx="420" cy="80" r="1.1"/>
    <circle cx="560" cy="200" r="0.9"/>
    <circle cx="680" cy="100" r="1.3"/>
    <circle cx="780" cy="170" r="0.8"/>
    <circle cx="880" cy="120" r="1"/>
    <circle cx="980" cy="200" r="0.9"/>
    <circle cx="1020" cy="90" r="1.1"/>
    <circle cx="50" cy="380" r="0.9"/>
    <circle cx="120" cy="460" r="1.2"/>
    <circle cx="950" cy="380" r="1"/>
    <circle cx="1000" cy="500" r="0.8"/>
    <circle cx="60" cy="700" r="1.1"/>
    <circle cx="140" cy="820" r="0.8"/>
    <circle cx="960" cy="720" r="1.2"/>
    <circle cx="1010" cy="840" r="0.9"/>
    <circle cx="40" cy="950" r="1"/>
    <circle cx="1040" cy="980" r="1.1"/>
    <circle cx="220" cy="970" r="0.8"/>
    <circle cx="860" cy="960" r="0.9"/>
  </g>

  <!-- Top ornament: diamant-lijn-diamant -->
  <g transform="translate(540 130)">
    <line x1="-160" y1="0" x2="-20" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="0" x2="160" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.6"/>
    <path d="M -10 0 L 0 -10 L 10 0 L 0 10 Z" fill="url(#igGold)" opacity="0.7"/>
    <path d="M -150 0 L -140 -8 L -130 0 L -140 8 Z" fill="url(#igGold)" opacity="0.5"/>
    <path d="M 150 0 L 140 -8 L 130 0 L 140 8 Z" fill="url(#igGold)" opacity="0.5"/>
  </g>

  <!-- HET CONCEPT eyebrow -->
  <text x="540" y="195" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="26" letter-spacing="16"
        fill="url(#igGold)">HET CONCEPT</text>

  <!-- ═══ LOGO: hangslot met kruis ═══ -->
  <g transform="translate(540 430) scale(2.6)">
    <g transform="translate(-60 -60)">
      <path d="M34 56 V42 a26 26 0 0 1 52 0 V56"
            stroke="url(#igGold)" stroke-width="6" stroke-linecap="round" fill="none"/>
      <rect x="24" y="56" width="72" height="64" rx="6" fill="url(#igLockBody)"/>
      <rect x="56" y="70" width="8" height="40" fill="#0a0e27"/>
      <rect x="46" y="82" width="28" height="8" fill="#0a0e27"/>
    </g>
  </g>

  <!-- Titel: Christenen & AI -->
  <text x="540" y="660" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="78" font-weight="500"
        fill="url(#igGold)">Christenen &amp; AI</text>

  <!-- Separator na titel -->
  <g transform="translate(540 705)">
    <line x1="-140" y1="0" x2="-12" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="0" x2="140" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.5"/>
    <path d="M -6 0 L 0 -6 L 6 0 L 0 6 Z" fill="url(#igGold)" opacity="0.6"/>
  </g>

  <!-- Body tekst (4 regels, italic serif) -->
  <g font-family="Georgia, 'Playfair Display', serif" font-size="32" fill="#f5f1e8" opacity="0.92" font-style="italic" text-anchor="middle">
    <text x="540" y="770">Wat als een AI 52 brieven schrijft</text>
    <text x="540" y="810">met de Bijbel (HSV) in de hand,</text>
    <text x="540" y="850">ze allemaal verzegelt</text>
    <text x="540" y="890">en ze pas één voor één opent?</text>
  </g>

  <!-- Knipoog -->
  <text x="540" y="960" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="24" font-style="italic"
        fill="url(#igGold)">— met een knipoog —</text>

  <!-- Bottom ornament -->
  <g transform="translate(540 1010)">
    <line x1="-180" y1="0" x2="-12" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="0" x2="180" y2="0" stroke="url(#igGold)" stroke-width="1" opacity="0.5"/>
    <path d="M -6 0 L 0 -6 L 6 0 L 0 6 Z" fill="url(#igGold)" opacity="0.6"/>
  </g>

  <!-- CLAUZIBOL.NL -->
  <text x="540" y="1050" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="22" letter-spacing="8"
        fill="url(#igGold)">CLAUZIBOL.NL</text>
</svg>
